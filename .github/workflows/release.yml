name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o demodata-linux-amd64 ./cmd/demodata

      - uses: actions/upload-artifact@v4
        with:
          name: demodata-linux-amd64
          path: demodata-linux-amd64

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w -H windowsgui" -o demodata-windows-amd64.exe ./cmd/demodata

      - uses: actions/upload-artifact@v4
        with:
          name: demodata-windows-amd64
          path: demodata-windows-amd64.exe

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: demodata-linux-amd64

      - uses: actions/download-artifact@v4
        with:
          name: demodata-windows-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            demodata-linux-amd64
            demodata-windows-amd64.exe
